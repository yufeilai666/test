name: 2 Update EPG Files

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '30 */4 * * *'  # UTC时间每4小时的30分钟运行

jobs:
  update-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz
        
    - name: Create epg directory if not exists
      run: mkdir -p epg
      
    - name: Download EPG files with retry
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}   # 私有仓库 Token
      run: |
        cat > download_epg.py << 'EOF'
        import json
        import requests
        import os
        import time
        from pathlib import Path
        import concurrent.futures
        from threading import Lock
        from datetime import datetime
        import pytz

        # 读取配置文件
        with open('files.json', 'r', encoding='utf-8') as f:
            config = json.load(f)

        epg_urls = config.get('epg_url', {})
        epg_dir = Path('epg')

        # 确保目录存在
        epg_dir.mkdir(exist_ok=True)

        # 创建锁用于线程安全的计数和打印
        print_lock = Lock()
        success_count = 0
        fail_count = 0

        def format_time():
            # 设置北京时区
            beijing_tz = pytz.timezone('Asia/Shanghai')
            # 获取当前UTC时间并转换为北京时间
            beijing_time = datetime.now(beijing_tz)
            return beijing_time.strftime('%H:%M:%S')

        # 获取私有仓库 Token
        pat_token = os.environ.get("PAT_TOKEN", "")

        def get_url_and_headers(original_url):
            """返回 (url, headers, auth_msg)，对私有仓库自动添加 Authorization"""
            headers = {
                'User-Agent': 'AptvPlayer/2.1.2',
                'Accept-Encoding': 'gzip'
            }
            auth_msg = None
            # 检查是否是私有仓库 URL（这里判断标准：raw.githubusercontent.com 且需要 token）
            # 你的私有仓库是 yufeilai666/tvepg，而其他公共文件不需要认证
            if "yufeilai666/tvepg" in original_url and pat_token:
                headers['Authorization'] = f'token {pat_token}'
                auth_msg = f"🔐 为私有仓库添加认证头: {original_url}"
            return original_url, headers, auth_msg

        def download_single_epg(item):
            global success_count, fail_count
            filename, original_url = item
            url, headers, auth_msg = get_url_and_headers(original_url)
            max_retries = 5  # 最大重试次数
            retry_delay = 1.5  # 重试延迟秒数
            
            # 为每个文件创建独立的日志列表
            all_logs = []
            
            def add_log(message):
                all_logs.append(f"[{format_time()}] {message}")
            
            # 如果有认证提示，加入日志（在开始下载之前）
            if auth_msg:
                add_log(auth_msg)
            
            result = False
            for attempt in range(max_retries):
                try:
                    add_log(f"🚀 开始下载: {filename} (尝试 {attempt + 1}/{max_retries})")
                    
                    # 下载文件
                    response = requests.get(url, headers=headers, timeout=60)
                    response.raise_for_status()  # 如果状态码不是200会抛出异常
                    
                    # 保存文件
                    file_path = epg_dir / filename
                    with open(file_path, 'wb') as f:
                        f.write(response.content)
                    
                    file_size = len(response.content)
                    add_log(f"✅ 下载成功: {filename} ({file_size:,} 字节)")
                    result = True
                    break  # 成功则跳出重试循环
                    
                except Exception as e:
                    error_msg = str(e)
                    if "Read timed out" in error_msg:
                        error_msg = "连接超时"
                    elif "Connection broken" in error_msg:
                        error_msg = "连接中断"
                    
                    add_log(f"⚠️ 下载失败: {filename} (尝试 {attempt + 1}/{max_retries}) - {error_msg}")
                    
                    # 如果是最后一次尝试仍然失败
                    if attempt == max_retries - 1:
                        add_log(f"❌ 放弃下载: {filename} (已达最大重试次数)")
                        result = False
                    else:
                        # 不是最后一次失败，等待后重试
                        add_log(f"⏳ 等待 {retry_delay:.2f} 秒后重试...")
                        time.sleep(retry_delay)
                        retry_delay *= 1.2  # 指数退避策略
            
            # 一次性输出这个文件的所有日志
            with print_lock:
                for log_line in all_logs:
                    print(log_line)
                print("─" * 22)
                
                if result:
                    success_count += 1
                else:
                    fail_count += 1
            
            return result

        print("=" * 36)
        print(f"📥 开始下载 EPG 文件…")
        print(f"📊 总计文件数: {len(epg_urls)} 个")
        print(f"🕒 开始时间(UTC+8): {format_time()}")
        print("=" * 36)
        print("─" * 22)

        # 使用线程池并行下载，最大并发数为5
        with concurrent.futures.ThreadPoolExecutor(max_workers=5) as executor:
            # 提交所有下载任务
            futures = {executor.submit(download_single_epg, item): item for item in epg_urls.items()}
            
            # 等待所有任务完成
            for future in concurrent.futures.as_completed(futures):
                filename = futures[future][0]
                try:
                    future.result()  # 获取结果，如果有异常会在这里抛出
                except Exception as e:
                    with print_lock:
                        print(f"[{format_time()}] ❌ 下载任务异常 {filename}: {str(e)}")
                        print("─" * 22)

        print("=" * 36)
        print(f"📊 下载完成报告")
        print(f"✅ 成功: {success_count} 个文件")
        print(f"❌ 失败: {fail_count} 个文件")
        print(f"🕒 结束时间(UTC+8): {format_time()}")
        print("=" * 36)

        # 如果有失败的文件，以代码0退出（不中断工作流）
        exit(0)
        EOF
        
        python download_epg.py
        
    - name: Clean up temporary script
      run: rm -f download_epg.py
        
    - name: Check for changes
      id: check_changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        echo "📁 EPG目录内容:"
        ls -la epg/
        
        # 更直接的方法：先添加epg目录到暂存区，然后检查是否有差异
        git add epg/
        
        # 检查暂存区与HEAD之间是否有差异
        if git diff --staged --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ 没有检测到EPG文件变动"
          # 重置暂存区，因为我们没有实际变化
          git reset
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "☑️ 检测到EPG文件变动"
          git status epg/
        fi
        
    - name: Get Beijing time
      if: steps.check_changes.outputs.changes == 'true'
      id: beijing_time
      run: |
        # 安装时区数据
        sudo apt-get update && sudo apt-get install -y tzdata
        
        # 获取北京时间并格式化为所需格式
        BEIJING_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        echo "beijing_time=$BEIJING_TIME" >> $GITHUB_OUTPUT
        echo "⏲️ 当前北京时间: $BEIJING_TIME"
        
    - name: Commit and push if changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git commit -m "🔄 自动更新EPG文件 [${{ steps.beijing_time.outputs.beijing_time }}]"
        git push