name: 1 Generate and Deploy TV M3U Files

on:
  # schedule:
    # 每4个小时自动运行一次（UTC时间）
    # - cron: '0 */4 * * *'
  # 允许手动触发工作流
  workflow_dispatch:
  # 当脚本文件或配置文件有更改时也触发
  push:
    paths:
      - 'scripts/generate_tv12_m3u.py'
      - 'scripts/generate_m3u.py'
      - 'files.json'

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests zhconv chardet

    - name: Run TV12 M3U generation script with retry
      continue-on-error: true  # 即使此步骤失败，也继续执行后续步骤
      id: run_tv12_script
      run: |
        cd scripts
        max_retries=3
        retry_count=0
        
        while [ $retry_count -lt $max_retries ]; do
          echo "🚀 尝试第 $((retry_count+1)) 次执行 TV12 脚本..."
          
          if python generate_tv12_m3u.py; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ TV12脚本执行成功"
            exit 0
          else
            retry_count=$((retry_count+1))
            if [ $retry_count -lt $max_retries ]; then
              echo "⚠️ TV12脚本执行失败，等待 30 秒后重试..."
              sleep 30
            fi
          fi
        done
        
        echo "status=failed" >> $GITHUB_OUTPUT
        echo "❌ TV12脚本执行失败，已达到最大重试次数 $max_retries"
        exit 0  # 继续执行后续步骤

    - name: Run general M3U generation script with retry
      continue-on-error: true  # 即使此步骤失败，也继续执行后续步骤
      id: run_general_script
      run: |
        cd scripts
        max_retries=3
        retry_count=0
        
        while [ $retry_count -lt $max_retries ]; do
          echo "🚀 尝试第 $((retry_count+1)) 次执行通用脚本..."
          
          if python generate_m3u.py; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 通用脚本执行成功"
            exit 0
          else
            retry_count=$((retry_count+1))
            if [ $retry_count -lt $max_retries ]; then
              echo "⚠️ 通用脚本执行失败，等待 30 秒后重试..."
              sleep 30
            fi
          fi
        done
        
        echo "status=failed" >> $GITHUB_OUTPUT
        echo "❌ 通用脚本执行失败，已达到最大重试次数 $max_retries"
        exit 0  # 继续执行后续步骤

    - name: List generated M3U files
      run: |
        echo "📑 Generated M3U files:"
        ls -la *.m3u 2>/dev/null || echo "⚠️ No M3U files found in root directory"
        ls -la scripts/*.m3u 2>/dev/null || echo "⚠️ No M3U files found in scripts directory"

    - name: Move M3U files to root directory
      run: |
        # 移动所有在scripts目录中生成的M3U文件到根目录
        if ls scripts/*.m3u 1> /dev/null 2>&1; then
          mv scripts/*.m3u ./
        fi
        
        # 检查根目录是否已经有M3U文件
        echo "📑 M3U files in root directory after moving:"
        ls -la *.m3u 2>/dev/null || echo "⚠️ No M3U files in root directory"

    - name: Check if any script succeeded
      id: check_success
      run: |
        tv12_status="${{ steps.run_tv12_script.outputs.status }}"
        general_status="${{ steps.run_general_script.outputs.status }}"
        
        if [ "$tv12_status" = "success" ] || [ "$general_status" = "success" ]; then
          echo "has_success=true" >> $GITHUB_OUTPUT
          echo "✅ 至少有一个脚本执行成功"
        else
          echo "has_success=false" >> $GITHUB_OUTPUT
          echo "❌ 所有脚本都执行失败"
        fi

    - name: Commit and push if changed
      if: steps.check_success.outputs.has_success == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查所有M3U文件是否有变化
        git add *.m3u
        if ! git diff --staged --quiet; then
          # 获取北京时间
          BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          
          # 获取暂存区变更的 .m3u 文件名（逗号分隔）
          CHANGED_FILES=$(git diff --staged --name-only -- '*.m3u' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="unknown"
          fi
          
          COMMIT_MSG="🔄 Auto-generated TV M3U files [$BEIJING_TIME UTC+8] [skip ci] | 变更: $CHANGED_FILES"
          echo "Commit message: $COMMIT_MSG"
          
          git commit -m "$COMMIT_MSG"
          
          # 添加 push 重试机制
          max_push_retries=3
          push_retry_count=0
          push_success=false
          
          while [ $push_retry_count -lt $max_push_retries ] && [ "$push_success" = false ]; do
            echo "📤 尝试第 $((push_retry_count+1)) 次推送更改..."
            
            if git push origin HEAD:main; then
              echo "✅ Changes pushed to repository successfully"
              push_success=true
            else
              push_retry_count=$((push_retry_count+1))
              if [ $push_retry_count -lt $max_push_retries ]; then
                echo "⚠️ 推送失败，等待 10 秒后重试..."
                sleep 10
                
                # 尝试拉取最新更改并重新推送
                echo "📩 尝试拉取最新更改..."
                if git pull --rebase origin main; then
                  echo "✅ 拉取成功，重新尝试推送..."
                else
                  echo "ℹ️ 拉取失败，跳过此步骤直接重试推送..."
                fi
              fi
            fi
          done
          
          if [ "$push_success" = false ]; then
            echo "❌ 推送失败，已达到最大重试次数 $max_push_retries"
            exit 1
          fi
        else
          echo "ℹ️ No changes to commit"
        fi

    - name: Show summary
      run: |
        echo "=== WORKFLOW SUMMARY ==="
        echo "TV12脚本状态: ${{ steps.run_tv12_script.outputs.status }}"
        echo "通用脚本状态: ${{ steps.run_general_script.outputs.status }}"
        echo "生成的M3U文件:"
        ls -la *.m3u 2>/dev/null || echo "No M3U files generated"
        echo "========================"

    - name: Fail if all scripts failed
      if: steps.check_success.outputs.has_success == 'false'
      run: |
        echo "❌ 所有脚本都执行失败，工作流标记为失败"
        exit 1