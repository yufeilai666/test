name: 每周节目单抓取

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  fetch-program:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前公共仓库
      - name: 检出当前仓库
        uses: actions/checkout@v4

      # 2. 检出私有脚本仓库
      - name: 检出私有脚本仓库分支
        uses: actions/checkout@v4
        with:
          repository: yufeilai666/tvepg
          ref: epg_scripts
          token: ${{ secrets.PAT_TOKEN }}
          path: epg_scripts

      # 3. 🔥 唯一需要安装的系统依赖，独立 C++ 程序，绝无崩溃
      - name: 安装 Tesseract 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-sim

      # 4. 安装轻量级 Python 依赖
      - name: 安装 Python 依赖
        run: |
          pip install pillow pytesseract

      # 5. 运行解析脚本
      - name: 运行解析脚本
        run: python epg_scripts/fetch_preview_cwjd.py

      # 6. 推送结果
      - name: 提交并推送结果
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/cwjd_epg.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot: 更新节目单 XML [skip ci]"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}