name: 重温经典频道每周节目单抓取

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  fetch-program:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前公共仓库
      - name: 检出当前仓库
        uses: actions/checkout@v6

      # 2. 检出私有脚本仓库
      - name: 检出私有脚本仓库分支
        uses: actions/checkout@v6
        with:
          repository: yufeilai666/tvepg
          ref: epg_scripts
          token: ${{ secrets.PAT_TOKEN }}
          path: epg_scripts

      # 3. 🔥 核心黑科技：直接使用官方 Docker 镜像运行 PaddleOCR
      # 彻底绕开本地 Python 环境安装，永不崩溃
      - name: 使用官方 PaddleOCR Docker 镜像解析节目单
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            paddlepaddle/paddleocr:latest-cpu \
            python /workspace/epg_scripts/fetch_preview_cwjd.py

      # 4. 提交并推送结果到当前仓库
      - name: 提交并推送结果
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/cwjd_epg.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot: 更新节目单 XML [skip ci]"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}