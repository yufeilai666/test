name: 每周节目单抓取

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  fetch-program:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前公共仓库
      - name: 检出当前仓库
        uses: actions/checkout@v4

      # 2. 检出私有脚本仓库
      - name: 检出私有脚本仓库分支
        uses: actions/checkout@v4
        with:
          repository: yufeilai666/tvepg
          ref: epg_scripts
          token: ${{ secrets.PAT_TOKEN }}
          path: epg_scripts

      # 3. 🔥 核心修正：拉取官方飞桨镜像，安装 PaddleOCR，并绕过 PIR 引擎崩溃
      - name: 使用官方 Docker 镜像解析节目单
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e FLAGS_enable_pir_api=0 \
            paddlepaddle/paddle:latest-cpu \
            bash -c "pip install paddleocr && python /workspace/epg_scripts/fetch_preview_cwjd.py"

      # 4. 提交并推送结果到当前仓库
      - name: 提交并推送结果
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/cwjd_epg.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot: 更新节目单 XML [skip ci]"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}