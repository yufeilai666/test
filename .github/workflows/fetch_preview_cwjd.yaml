name: 重温经典频道每周节目单抓取

on:
  # schedule:
    # 每天北京时间早上 6:00 执行 (UTC 22:00)
    # - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动在Actions面板点击触发

jobs:
  fetch-program:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出【当前公共仓库 yufeilai666/test】
      - name: 检出当前仓库
        uses: actions/checkout@v6

      # 2. 检出【私有脚本仓库 yufeilai666/tvepg】的 epg_scripts 分支
      - name: 检出私有脚本仓库分支
        uses: actions/checkout@v6
        with:
          repository: yufeilai666/tvepg
          ref: epg_scripts                      # 指定拉取 epg_scripts 分支
          token: ${{ secrets.PAT_TOKEN }}       # 拉取私库的 PAT
          path: epg_scripts                     # 克隆到本地 epg_scripts 文件夹
        
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装系统依赖 (Tesseract 和中文包)
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libsm6 libxrender1 libfontconfig1

      # 4. 安装 Python 依赖
      - name: 安装 Python 依赖
        run: |
          pip install pillow numpy
          pip install paddlepaddle==2.5.2 paddleocr

      # 5. 运行位于私有仓库 epg_scripts 分支中的主脚本
      - name: 运行爬虫脚本
        # env:
          # FLAGS_enable_pir_api: 0
        run: python epg_scripts/fetch_preview_cwjd.py

      # 6. 将生成的 XML 推送到当前公共仓库的 epg 目录
      - name: 提交并推送结果到当前仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加 epg 目录下的 XML 文件
          git add epg/cwjd_epg.xml
          
          # 有变更才提交，避免空提交报错
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot: 更新节目单 XML [skip ci]"
          
          # 使用 PAT 推送到当前公共仓库 (yufeilai666/test)
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}