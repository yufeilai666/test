name: 每周节目单抓取

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  fetch-program:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 检出私有脚本仓库分支
        uses: actions/checkout@v4
        with:
          repository: yufeilai666/tvepg
          ref: epg_scripts
          token: ${{ secrets.PAT_TOKEN }}
          path: epg_scripts

      # 🔥 极简版：仅安装 requests，通过 env 显式传递 Secrets
      - name: 安装依赖并解析
        run: |
          pip install requests
          python epg_scripts/fetch_preview_cwjd.py
        env:
          BAIDU_OCR_API_KEY: ${{ secrets.BAIDU_OCR_API_KEY }}
          BAIDU_OCR_SECRET_KEY: ${{ secrets.BAIDU_OCR_SECRET_KEY }}

      - name: 提交并推送结果
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/cwjd_epg.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot: 更新节目单 XML [skip ci]"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}